<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 245" width="200" height="245">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#56ab2f"/>
      <stop offset="55%" stop-color="#2980b9"/>
      <stop offset="100%" stop-color="#1a5f9e"/>
    </linearGradient>
    <linearGradient id="smokeGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#eceff1" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#b0bec5" stop-opacity="0.7"/>
    </linearGradient>
    <clipPath id="shieldClip">
      <path d="M100 14 L172 42 L172 108 Q168 155 100 180 Q32 155 28 108 L28 42 Z"/>
    </clipPath>
  </defs>

  <!-- Shield body -->
  <path d="M100 14 L172 42 L172 108 Q168 155 100 180 Q32 155 28 108 L28 42 Z"
        fill="url(#shieldGrad)"/>

  <!-- Inner shield highlight -->
  <path d="M100 24 L160 48 L160 108 Q156 146 100 168 Q44 146 40 108 L40 48 Z"
        fill="white" fill-opacity="0.10"/>

  <!-- Smoke cloud (clipped inside shield) -->
  <g clip-path="url(#shieldClip)">
    <circle cx="80"  cy="68" r="19" fill="url(#smokeGrad)"/>
    <circle cx="96"  cy="55" r="15" fill="url(#smokeGrad)"/>
    <circle cx="68"  cy="57" r="14" fill="url(#smokeGrad)"/>
    <circle cx="84"  cy="44" r="11" fill="#eceff1" fill-opacity="0.9"/>
    <circle cx="70"  cy="43" r="9"  fill="#eceff1" fill-opacity="0.8"/>
    <circle cx="96"  cy="42" r="8"  fill="white"   fill-opacity="0.75"/>
  </g>

  <!-- Bug body -->
  <ellipse cx="108" cy="110" rx="17" ry="24" fill="#263238"/>
  <!-- Bug thorax -->
  <ellipse cx="108" cy="90"  rx="13" ry="11" fill="#263238"/>
  <!-- Bug head -->
  <ellipse cx="108" cy="76"  rx="9"  ry="8"  fill="#263238"/>
  <!-- Antennae -->
  <line x1="103" y1="70" x2="92"  y2="58" stroke="#263238" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="113" y1="70" x2="124" y2="58" stroke="#263238" stroke-width="2.2" stroke-linecap="round"/>
  <!-- Legs left -->
  <line x1="93"  y1="92"  x2="72"  y2="84"  stroke="#263238" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="92"  y1="103" x2="70"  y2="101" stroke="#263238" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="93"  y1="114" x2="73"  y2="118" stroke="#263238" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs right -->
  <line x1="123" y1="92"  x2="144" y2="84"  stroke="#263238" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="124" y1="103" x2="146" y2="101" stroke="#263238" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="123" y1="114" x2="143" y2="118" stroke="#263238" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Spray nozzle diagonal line -->
  <line x1="60" y1="148" x2="158" y2="58" stroke="#455a64" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <!-- Nozzle tip -->
  <circle cx="60" cy="148" r="6" fill="#37474f"/>
  <circle cx="60" cy="148" r="3" fill="#78909c"/>

  <!-- Brand text -->
  <text x="100" y="207"
        text-anchor="middle"
        font-family="'Arial Black', 'Franklin Gothic Heavy', 'Impact', sans-serif"
        font-weight="900"
        font-size="28"
        fill="#37474f"
        letter-spacing="2">FUMITECH</text>
  <text x="100" y="226"
        text-anchor="middle"
        font-family="'Arial', 'Helvetica Neue', sans-serif"
        font-weight="400"
        font-size="13"
        fill="#546e7a"
        letter-spacing="8">SERVICES</text>
</svg>
